<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
{% load static %}
<link rel="stylesheet" href="{% static 'style.css' %}">

<body>
    <div class="container2">
        <h1>Update Song</h1>
        <form action="{% url 'update_song' song.id %}" method="post">
            {% csrf_token %}

            <label for="">Owner ID</label><br><br>
            <input type="number" name="owner" value="{{song.owner.id}}"><br><br>

            <label for="">Generation Status</label><br><br>
            <input type="text" name="generation_status" value="{{song.generation_status}}"><br><br>

            <label for="">Title</label><br><br>
            <input type="text" name="title" value="{{song.title}}"><br><br>

            <label for="">Occasion</label><br><br>
            <input type="text" name="occasion" value="{{song.occasion}}"><br><br>

            <label for="">Genre</label><br><br>
            <input type="text" name="genre" value="{{song.genre}}"><br><br>

            <label for="">Singer voice type</label><br><br>
            <input type="text" name="singer_voice_type" value="{{song.singer_voice_type}}"><br><br>

            <label for="">Mood</label><br><br>
            <input type="text" name="mood" value="{{song.mood}}"><br><br>

            <label for="">Track Length</label><br><br>
            <input type="number" name="track_length" value="{{song.track_length}}"><br><br>

            <label for="">Share Link</label><br><br>
            <input type="text" name="share_link" value="{{song.share_link}}"><br><br>

            <button type="submit" id="new1">Update</button>
        </form>

    </div>
</body>

</html>
